name: build-android-multi

on:
  workflow_dispatch:
  push:
    tags:
      - "android-v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: armv7
            goarch: arm
            goarm: "7"
            abi: armeabi-v7a
            clang_prefix: armv7a-linux-androideabi
          - arch: arm64-v8a
            goarch: arm64
            goarm: ""
            abi: arm64-v8a
            clang_prefix: aarch64-linux-android

    env:
      BINARY_NAME: cloudflared
      GO_VERSION: "1.26.2"
      GOOS: android
      CGO_ENABLED: "1"
      ANDROID_API_LEVEL: "21"
      ANDROID_NDK_VERSION: "27.2.12479018"
      # Termux resolv.conf 实际路径
      TERMUX_RESOLV_CONF: /data/data/com.termux/files/usr/etc/resolv.conf

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true

      - name: Patch Go stdlib resolv.conf path for Android/Termux
        run: |
          GOROOT=$(go env GOROOT)
          DNS_CONFIG="$GOROOT/src/net/dnsconfig_unix.go"
          echo "Patching $DNS_CONFIG"
          cp "$DNS_CONFIG" "$DNS_CONFIG.bak"
          sed -i 's|"/etc/resolv.conf"|"${{ env.TERMUX_RESOLV_CONF }}"|g' "$DNS_CONFIG"
          echo "=== Result ==="
          grep -n "resolv" "$DNS_CONFIG"

      - name: Set up Android SDK + NDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "ndk;${ANDROID_NDK_VERSION}"

      - name: Export Android toolchain env
        run: |
          NDK="$ANDROID_SDK_ROOT/ndk/${ANDROID_NDK_VERSION}"
          TOOLCHAIN="$NDK/toolchains/llvm/prebuilt/linux-x86_64"
          echo "ANDROID_NDK_ROOT=$NDK"           >> $GITHUB_ENV
          echo "TOOLCHAIN=$TOOLCHAIN"             >> $GITHUB_ENV
          echo "CC=$TOOLCHAIN/bin/${{ matrix.clang_prefix }}${ANDROID_API_LEVEL}-clang"    >> $GITHUB_ENV
          echo "CXX=$TOOLCHAIN/bin/${{ matrix.clang_prefix }}${ANDROID_API_LEVEL}-clang++" >> $GITHUB_ENV
          echo "AR=$TOOLCHAIN/bin/llvm-ar"        >> $GITHUB_ENV
          echo "LD=$TOOLCHAIN/bin/ld"             >> $GITHUB_ENV
          echo "STRIP=$TOOLCHAIN/bin/llvm-strip"  >> $GITHUB_ENV

      - name: Show toolchain info
        run: |
          echo "CC=$CC"
          go version
          "$CC" --version

      - name: Download dependencies
        run: go mod download

      - name: Build ${{ matrix.abi }}
        env:
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
        run: |
          mkdir -p dist
          OUT="dist/${BINARY_NAME}-android-${{ matrix.arch }}"
          go build \
            -trimpath \
            -buildvcs=false \
            -ldflags="-s -w" \
            -o "${OUT}" \
            ./cmd/cloudflared
          chmod +x "${OUT}"
          file "${OUT}" || true
          sha256sum "${OUT}" > "${OUT}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cloudflared-android-${{ matrix.arch }}
          path: |
            dist/cloudflared-android-${{ matrix.arch }}
            dist/cloudflared-android-${{ matrix.arch }}.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/android-v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/cloudflared-android-armv7
            dist/cloudflared-android-armv7.sha256
            dist/cloudflared-android-arm64-v8a
            dist/cloudflared-android-arm64-v8a.sha256
          generate_release_notes: true
