name: build-android-multi

on:
  workflow_dispatch:
  push:
    tags:
      - "android-v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: armv7
            goarch: arm
            goarm: "7"
            clang_prefix: armv7a-linux-androideabi
          - arch: arm64-v8a
            goarch: arm64
            goarm: ""
            clang_prefix: aarch64-linux-android

    env:
      BINARY_NAME: cloudflared
      GO_VERSION: "1.26.2"
      GOOS: android
      CGO_ENABLED: "1"
      ANDROID_API_LEVEL: "21"
      ANDROID_NDK_VERSION: "27.2.12479018"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true

      - name: Set up Android SDK + NDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "ndk;${ANDROID_NDK_VERSION}"

      - name: Export Android toolchain env
        run: |
          NDK="$ANDROID_SDK_ROOT/ndk/${ANDROID_NDK_VERSION}"
          TOOLCHAIN="$NDK/toolchains/llvm/prebuilt/linux-x86_64"
          echo "ANDROID_NDK_ROOT=$NDK"           >> $GITHUB_ENV
          echo "TOOLCHAIN=$TOOLCHAIN"             >> $GITHUB_ENV
          echo "CC=$TOOLCHAIN/bin/${{ matrix.clang_prefix }}${ANDROID_API_LEVEL}-clang"    >> $GITHUB_ENV
          echo "CXX=$TOOLCHAIN/bin/${{ matrix.clang_prefix }}${ANDROID_API_LEVEL}-clang++" >> $GITHUB_ENV
          echo "AR=$TOOLCHAIN/bin/llvm-ar"        >> $GITHUB_ENV
          echo "LD=$TOOLCHAIN/bin/ld"             >> $GITHUB_ENV
          echo "STRIP=$TOOLCHAIN/bin/llvm-strip"  >> $GITHUB_ENV

      - name: Inject Android DNS fix
        run: |
          # 创建一个新包，用 init() 在进程启动时强制覆盖 Go 的 net.DefaultResolver
          # 使其直接连接 Android 系统 DNS（8.8.8.8 作为后备，运行时可被系统覆盖）
          mkdir -p cmd/cloudflared_android_dns
          cat > cmd/cloudflared_android_dns/dns_android.go << 'EOF'
          //go:build android

          package main

          import (
          	"context"
          	"net"
          )

          func init() {
          	// Android/Termux 没有 /etc/resolv.conf，Go 纯 resolver 会 fallback 到 [::1]:53
          	// 直接替换 DefaultResolver 为显式指向 Android 系统 DNS
          	net.DefaultResolver = &net.Resolver{
          		PreferGo: false,
          		Dial: func(ctx context.Context, network, address string) (net.Conn, error) {
          			d := net.Dialer{}
          			// 优先尝试 Android 常见系统 DNS 地址
          			for _, dns := range []string{
          				"8.8.8.8:53",
          				"1.1.1.1:53",
          				"114.114.114.114:53",
          			} {
          				conn, err := d.DialContext(ctx, "udp", dns)
          				if err == nil {
          					return conn, nil
          				}
          			}
          			// fallback: 尝试原始地址
          			return d.DialContext(ctx, network, address)
          		},
          	}
          }
          EOF

          # 把这个文件放到 cloudflared 主包里（cmd/cloudflared/）
          # 注意：package 声明要和目标包一致
          sed -i 's/^package main/package main/' cmd/cloudflared_android_dns/dns_android.go || true
          cp cmd/cloudflared_android_dns/dns_android.go cmd/cloudflared/dns_android_fix.go

          echo "=== Injected file ==="
          cat cmd/cloudflared/dns_android_fix.go

      - name: Download dependencies
        run: go mod download

      - name: Build ${{ matrix.arch }}
        env:
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
        run: |
          mkdir -p dist
          OUT="dist/${BINARY_NAME}-android-${{ matrix.arch }}"
          go build \
            -trimpath \
            -buildvcs=false \
            -tags "netcgo osusergo" \
            -ldflags="-s -w" \
            -o "${OUT}" \
            ./cmd/cloudflared
          chmod +x "${OUT}"
          file "${OUT}" || true
          sha256sum "${OUT}" > "${OUT}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cloudflared-android-${{ matrix.arch }}
          path: |
            dist/cloudflared-android-${{ matrix.arch }}
            dist/cloudflared-android-${{ matrix.arch }}.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/android-v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/cloudflared-android-armv7
            dist/cloudflared-android-armv7.sha256
            dist/cloudflared-android-arm64-v8a
            dist/cloudflared-android-arm64-v8a.sha256
          generate_release_notes: true
