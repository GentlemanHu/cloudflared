name: build-android-armv7

on:
  workflow_dispatch:
  push:
    tags:
      - "android-v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      BINARY_NAME: cloudflared
      GO_VERSION: "1.26.2"
      GOOS: android
      GOARCH: arm
      GOARM: "7"
      CGO_ENABLED: "1"

      # Android 5.0 = API 21
      ANDROID_API_LEVEL: "21"
      ANDROID_NDK_VERSION: "27.2.12479018"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true

      - name: Set up Android SDK + NDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "ndk;${ANDROID_NDK_VERSION}"

      - name: Export Android toolchain env
        run: |
          NDK="$ANDROID_SDK_ROOT/ndk/${ANDROID_NDK_VERSION}"
          TOOLCHAIN="$NDK/toolchains/llvm/prebuilt/linux-x86_64"

          echo "ANDROID_NDK_ROOT=$NDK" >> $GITHUB_ENV
          echo "TOOLCHAIN=$TOOLCHAIN" >> $GITHUB_ENV
          echo "CC=$TOOLCHAIN/bin/armv7a-linux-androideabi${ANDROID_API_LEVEL}-clang" >> $GITHUB_ENV
          echo "CXX=$TOOLCHAIN/bin/armv7a-linux-androideabi${ANDROID_API_LEVEL}-clang++" >> $GITHUB_ENV
          echo "AR=$TOOLCHAIN/bin/llvm-ar" >> $GITHUB_ENV
          echo "LD=$TOOLCHAIN/bin/ld" >> $GITHUB_ENV
          echo "STRIP=$TOOLCHAIN/bin/llvm-strip" >> $GITHUB_ENV

      - name: Show toolchain info
        run: |
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          echo "ANDROID_NDK_ROOT=$ANDROID_NDK_ROOT"
          echo "TOOLCHAIN=$TOOLCHAIN"
          echo "CC=$CC"
          go version
          go env
          "$CC" --version

      - name: Download dependencies
        run: |
          go mod download

      - name: Build Android armv7
        run: |
          mkdir -p dist

          OUT="dist/${BINARY_NAME}-android-armv7"

          go build \
            -trimpath \
            -buildvcs=false \
            -ldflags="-s -w" \
            -o "${OUT}" \
            ./cmd/cloudflared

          chmod +x "${OUT}"
          file "${OUT}" || true
          sha256sum "${OUT}" > "${OUT}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cloudflared-android-armv7
          path: |
            dist/cloudflared-android-armv7
            dist/cloudflared-android-armv7.sha256

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/android-v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/cloudflared-android-armv7
            dist/cloudflared-android-armv7.sha256
          generate_release_notes: true
